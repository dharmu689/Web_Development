<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <h1>Feedback Form </h1>
    <form >
        <label for="fname">Your Name:</label>
        <input type="text" name="fname" id="fname">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
        <br>
        <br>

        <label >Rate Us:</label>
        <input type="radio" name="rate" id="redio">
        <label for="redio">1 Star</label>

        <input type="radio" name="rate" id="redi">
        <label for="redi">2 Star</label>
        
        <input type="radio" name="rate" id="red">
        <label for="red">3 Star</label>

        <input type="radio" name="rate" id="re">
        <label for="re">4 Star</label>

        <input type="radio" name="rate" id="r">
        <label for="r">5 Star</label>

        <br>
        <br>

        <label for="msg">Comments:</label>
        <textarea name="msg" id="msg" rows="5" cols="20"></textarea>

        <br>
        <br>

        <button>Submit Feedback</button>

    </form>


</body>
</html>
