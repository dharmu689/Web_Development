<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Home Work</title>
</head>
<body>
    <h1>Employee Details Form</h1>
    <form >
        <label for="fname">Full Name:</label>  
        <input type="text" name="fname" id="fname" placeholder="Enter your full name"> 

        <br>
        <br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Enter your email addres">

        <br>
        <br>

        <label for="pho">Phone Number:</label>
        <input type="tel" name="pho" id="pho" placeholder="Entr your phone number">

        <br>
        <br>

        <label>Gender:</label>

        <input type="radio" name="gender" id="male" value="Male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="Female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="oth" value="other">
        <label for="oth">Other</label>

        <br>
        <br>

        <label for="job">Job Tittle:</label>

        <input type="text" name="job" id="job" placeholder="Enter your job tittle">

        <br>
        <br>

        <label for="dept">Department:</label>
        <select name="dept" id="dept">
            <option value="" disable selected>Select the options</option>
            <option value="cse">cse</option>
            <option value="ai">ai</option>
            <option value="ml">ml</option>
            <option value="robotic">robotic</option>
        </select>

        <br>
        <br>

        <button>Submit</button>

    </form>


</body>
</html>
