<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Details Form</title>
</head>
<body>
    <h1>Health Details Form</h1>
    <fieldset>
        <legend>Personal Information</legend>
        <form>
            <label for="fname">Full Nmae:</label>
            <input type="text" id="fname" name="Fname">
            
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" name="DOB" id="dob">

            <br><br>

            <label>Gender:</label>

            <select name="Gender" id="gen">
                <option value="" disabled>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <br><br>

            <label for="tel">Phone number:</label>
            <input type="tel" name="Contact" id="tel">

            <br><br>

        </form>
    </fieldset>

    <fieldset>
        <legend>Medical History</legend>
        <form>
            <label for="bol">Blood Group:</label>
            <select name="BG" id="bol">
                <option value="">Select Blood Group</option>
                <option value="A">A</option>
                <option value="A+">A+</option>
                <option value="B">B</option>
                <option value="B+">B+</option>
                <option value="O">O</option>
                <option value="O+">O+</option>
            </select>

            <br><br>

            <label for="">Do you were glasses or contact lenses?</label>
            <br>
            <input type="radio" name="bool" id="yes">
            <label for="yes">Yes</label>

            <br>
            <input type="radio" name="bool" id="no">
            <label for="no">no</label>

            <br><br>

            <label for="msg">Pre-existing conditions:</label>
            <br>
            <textarea name="MSG" id="msg" placeholder="List any pre-existing medical conditions" rows="5" cols="40"></textarea>

            <br><br>

            <label>Allergies:</label>
            <br>
            <input type="checkbox" name="box" id="check" value="Pollen">
            <label for="check">Pollen</label>
            <br>
            <input type="checkbox" name="box" id="chec" value="Peanuts">
            <label for="chec">Peanuts</label>
            <br>
            <input type="checkbox" name="box" id="che" value="Latex">
            <label for="che">Latex</label>
            <br>
            <input type="checkbox"name="box" id="ch" value="None">
            <label for="ch">None</label>

            <br>
            <br>

            <label for="MSg">Current Medications:</label>
            <br>
            <textarea name="Msg" id="MSg" rows="3" cols="40" placeholder="List any current medications"></textarea>

        </form>
    </fieldset>

    <fieldset>
        <legend>Emergency Contact</legend>
        <form>
            <label for="ecn">Emergency Contact Name:</label>
            <input type="text" name="ECN" id="ecn">

            <br><br>

            <label for="ecp">Emergency Contact Phone:</label>
            <input type="text" name="ECP" id="ecp">

            <br><br>

            <label for="rec">Relationship to Emergeny Contact:</label>
            <input type="text" name="REC" id="rec">

        </form>
    </fieldset>
    <br>
    <button>Submit</button>
</body>
</html>
