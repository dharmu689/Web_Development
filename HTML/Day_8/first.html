<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>IIT JEE Registeration form</legend>
        <form>
        <label for="fname">Full name:</label>
        <input type="text" name="fname" id="fname">
 
        <br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email">

        <br><br>

        <label for="tel">Phone:</label>
        <input type="tel" name="Contact" id="tel">

        <br><br>

        <label for="pass">Passwor:</label>
        <input type="password" name="Password" id="pass">

        <br><br>

        <label>Gender:</label>

        <input type="radio" name="gender" id="gen" value="Male">
        <label for="gen">Male</label>

        <input type="radio" name="gender" id="fem" value="Female">
        <label for="fem">Female</label>

        <input type="radio" name="gender" id="oth" value="other">
        <label for="oth">Other</label>

        <br><br>

        <label for="date">Date of Birth:</label>
        <input type="date" name="DOB" id="date" min="2001-01-01" max="2005-12-31">

        <br><br>

        <label for="sname">School Name:</label>
        <input type="text" name="Sname" id="sname">

        <br><br>

        <label for="board">Board:</label>
        <select name="Board" id="board">
            <option value="" disable>Select your board</option>
            <option value="CBSC">CBSC</option>
            <option value="Bihar Board">Bihar Board</option>
            <option value="other">other</option>
        </select>

        <br><br>

        <label for="year">Year of Passing:</label>
        <input type="number" name="Year" id="year" min="2023" max="2025">

        <br><br>

        <label for="exam">Exam-Center:</label>
        <select name="Exam Center" id="exam">
            <option value="" >Select Center</option>
            <option value="Patna">Patna</option>
            <option value="Rajgir">Rajgir</option>
            <option value="Bihar Sharif">Bihar Sharif</option>
            <option value="Silao">Silao</option>
        </select>

        <br><br>
 
        <button>Register</button>


    </form>
    </fieldset>
    

</body>
</html>
